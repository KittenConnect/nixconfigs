name: Nix Flake actions

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true # TODO: pass it to false

on:
  pull_request:
    branches:
    - main

  push:
    branches:
    - main
    - 'releases/**'

  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  nix-matrix:
    name: Register all build jobs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        # with: 
        #   install_url: https://install.lix.systems/lix
        #   install_options: install --no-confirm
        # 
      - id: set-matrix
        name: Generate Nix Matrix
        run: |
          set -Eeuo pipefail
          echo "matrix=$(nix eval --json -f ./ci/workflows.nix)" >> "$GITHUB_OUTPUT"

  build-nix:
    name: Build all nix versions
    runs-on: ubuntu-latest
    outputs:
      artifact: ${{steps.upload.outputs.artifact_id}}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        # with: 
        #   install_url: https://install.lix.systems/lix
        #   install_options: install --no-confirm
      
      - id: build-all-nix
        name: Build Nix packages
        run: |
          set -Eeuo pipefail

          nix build --print-out-paths -vL -f ci/build-all-nix.nix _allPackages | while read -r OUT; do
            nix copy --no-check-sigs --to "file://$PWD/nixPackages" "$OUT"
            mkdir -vp "$PWD/nixPackages/result"
            for l in $(find "$OUT" -type l -maxdepth 1 -print); do
              ln -sf $(readlink -f $l) "$PWD/nixPackages/result/$(basename $l)"
            done 
          done
      - uses: actions/upload-artifact@v4
        id: upload
        with:
          name: toplevel-all-nixPackages
          path: nixPackages

  build-toplevel:
    name: "nixOS: ${{ matrix.name }} (${{ matrix.system }})"
    needs: [nix-matrix, build-nix]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{fromJSON(needs.nix-matrix.outputs.matrix)}}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        # with:
        #   install_url: https://install.lix.systems/lix
        #   install_options: install --no-confirm

      # - name: Download Nix versions
      #   uses: actions/download-artifact@v4
      #   with:
      #     path: nixVersions
      #     pattern: toplevel-all-nixPackages

      - name: Nix build ${{matrix.name}}
        id: nix-toplevel
        run: |
          set -Eeuo pipefail

          nix build --print-out-paths -vL -f '${{ matrix.file }}' '${{ matrix.attr }}' | while read -r storePath; do
            nix copy --to file://$PWD/'toplevel-${{matrix.name}}' $storePath
            echo "toplevel=$storePath" | tee -a "$GITHUB_OUTPUT"
          done

      - uses: actions/upload-artifact@v4
        id: artifact-upload-step
        with:
          name: toplevel-${{matrix.name}}
          path: toplevel-${{matrix.name}}

      # - uses: actions/upload-artifact@v4
      #   id: artifact-upload-storePath
      #   with:
      #     name: storepath-${{matrix.name}}
      #     path: storepath-${{matrix.name}}

       ## Write for matrix outputs workaround 
      - uses: cloudposse/github-action-matrix-outputs-write@v1
        id: out
        with:
          matrix-step-name: ${{ github.job }}
          matrix-key: ${{ matrix.name }}
          outputs: |
            artifact: ${{ steps.artifact-upload-step.outputs.artifact-url }}
            toplevel: ${{ steps.nix-toplevel.outputs.toplevel }}


          
  # Single deploy job since we're just deploying
  nix-pages:
    needs: build-toplevel
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # on: Runs on pushes targeting the default branch
    #  push:
    #   branches: ["main"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
  
      - uses: cloudposse/github-action-matrix-outputs-read@v1
        id: read
        with:
          matrix-step-name: build-toplevel

      # - name: Download All Artifacts
      #   uses: actions/download-artifact@v4
      #   with:
      #     path: outputs
      #     pattern: toplevel-*
      #     merge-multiple: true
      - name: Deploy artifact
        run: |
          set -Eeuo pipefail
          ls -lah
          mkdir -vp outputs/cache

          nix key generate-secret --key-name kitten-gh-actions-$(date "+%F_%H%M%S") > sign.key
          nix key convert-secret-to-public < sign.key > outputs/cache/sign.key

          jq -r '. as $root | .artifact | to_entries | .[] | "\(.key) \($root.toplevel[.key]) \(.value)"' <<< '${{ toJson(fromJson(steps.read.outputs.result)) }}' \
          | while read -r key toplevel value; do
            if [[ -z "$key" ]] || [[ -z "$value" ]] || [[ -z "$toplevel" ]]; then continue; fi
            echo "Deploying artifact $key with toplevel $toplevel from $value" >&2
            nix copy --from "file://$PWD/toplevel-$key" "$toplevel"
            nix-store --query -R "$toplevel" | nix -v store sign -k ./sign.key --stdin
            nix copy --to file://$PWD/outputs/cache "$toplevel"
            echo "$key $toplevel" >> "outputs/index.txt"
          done
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: 'outputs'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
